name: youtube-downloader

services:
    server:
        user: "${UID:-1000}:${GID:-1000}"
        image: registry.florian-dev.fr:443/floriantrayon/youtube-downloader:${VERSION:-latest}
        command: apache2-foreground
        restart: unless-stopped
        cap_drop:
            - ALL
        volumes:
            - ./output:/var/www/html/output
        security_opt:
            - no-new-privileges=true
        healthcheck:
            test: curl -f http://localhost:8080/
            retries: 3
            timeout: 5s
            start_period: 30s
        deploy:
            resources:
                limits:
                    pids: 64
                    cpus: "1"
                    memory: 128M
        build:
            target: production
            context: .
            dockerfile: docker/Dockerfile
        ports:
            - "${PORT:-8080}:8080"
