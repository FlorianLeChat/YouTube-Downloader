stages:
    - build
    - deploy

build:project:
    stage: build
    image: alpine:3
    rules:
        -   if: $CI_COMMIT_TAG
            when: on_success
        -   if: $CI_COMMIT_BRANCH
            when: manual
    before_script:
        - apk add --no-cache zip
        - mv $ENV_FILE .env
        - echo "" >> .env
        - echo "VERSION=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}" >> .env
    script:
        - mv compose.production.yml compose.yml
        - zip -r $CI_PROJECT_NAME-project.zip .env compose.yml
    artifacts:
        paths:
            - .env
            - .gitlab/ansible/
            - compose.yml
            - project.zip
        access: none
        expire_in: 1 hour

build:docker:
    stage: build
    image: docker:29
    services:
        - docker:29-dind
    variables:
        DOCKER_TLS_CERTDIR: "/certs"
    script:
        - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
        - docker compose pull --ignore-buildable --ignore-pull-failures
        - docker compose build
        - docker compose push
    dependencies:
        - build:project

deploy:ansible:
    stage: deploy
    image: alpine:3
    variables:
        GIT_STRATEGY: none
        ANSIBLE_HOST_KEY_CHECKING: false
    before_script:
        - apk add --no-cache openssl openssh-client ansible
        - eval $(ssh-agent -s)
        - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
        - mkdir -p ~/.ssh
        - chmod 700 ~/.ssh
        - echo $ANSIBLE_VAULT_PASSWORD > .vault_password.txt
    script:
        - ansible-playbook -i .gitlab/ansible/hosts.yml --vault-password-file .vault_password.txt .gitlab/ansible/deploy.yml