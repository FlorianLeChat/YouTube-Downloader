---
-   hosts: proxmox
    vars:
        application_path: "/var/www/florian-dev.fr/youtube"
    tasks:
        -   name: Installation des dépendances système
            apt:
                name:
                    - zip
                    - rsync
                state: present
                update_cache: true

        -   name: Création du répertoire d'installation
            file:
                path: "{{ application_path }}"
                state: directory
                mode: "0700"
                owner: debian
                group: debian

        -   name: Création du répertoire temporaire
            file:
                path: "{{ application_path }}_temp"
                state: directory
                mode: "0700"
                owner: debian
                group: debian

        -   name: Extraction des fichiers du projet dans le répertoire temporaire
            unarchive:
                src: "../../project.zip"
                dest: "{{ application_path }}_temp"
                remote_src: false
                keep_newer: true

        -   name: Synchronisation des fichiers
            ansible.posix.synchronize:
                src: "{{ application_path }}_temp/"
                dest: "{{ application_path }}/"
                delete: true
                recursive: true

        -   name: Application des permissions sur le répertoire d'installation
            file:
                path: "{{ application_path }}"
                owner: debian
                group: debian
                state: directory

        -   name: Suppression du répertoire temporaire
            file:
                path: "{{ application_path }}_temp"
                state: absent

        -   name: Redémarrage du conteneur Docker
            community.docker.docker_compose_v2:
                renew_anon_volumes: true
                remove_orphans: true
                remove_volumes: true
                remove_images: all
                project_src: "{{ application_path }}"
                recreate: always
                build: never
                pull: always

        -   name: Application des permissions sur les fichiers de variables d'environnement
            file:
                path: "{{ item }}"
                mode: "0400"
                owner: debian
                group: debian
            loop:
                - "{{ application_path }}/.env"
